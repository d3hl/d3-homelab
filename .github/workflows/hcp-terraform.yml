name: HCP Terraform
# deploy
on:
  pull_request:
    paths:
      - 'terraform/**'
      - '.github/workflows/hcp-terraform.yml'
  push:
    branches:
      - main
    paths:
      - 'terraform/**'
      - '.github/workflows/hcp-terraform.yml'
  workflow_dispatch:

env:
  TF_CLOUD_ORGANIZATION: d3-org
  TF_WORKSPACE: pve

permissions:
  contents: read
  pull-requests: write

jobs:
  terraform-validate:
    name: Validate Terraform
    runs-on: self-hosted
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Load secret from 1Password
        uses: 1password/load-secrets-action@v4
        with:
          export-env: true
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
          TF_API_TOKEN: ${{ secrets.TF_API_TOKEN }}
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Format Check
        working-directory: terraform
        run: terraform fmt -check -recursive

      - name: Terraform Init
        working-directory: terraform/pve
        run: terraform init

      - name: Terraform Validate
        working-directory: terraform/pve
        run: terraform validate

  terraform-plan:
    name: Plan Changes
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    needs: terraform-validate
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Load secret from 1Password
        uses: 1password/load-secrets-action@v4
        with:
          export-env: true
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
          TF_API_TOKEN: op://d3HL/Terraform Proxmox GitOps.env/TF_API_TOKEN

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          cli_config_credentials_token: ${{ env.TF_API_TOKEN }}

      - name: Terraform Init
        working-directory: terraform/pve
        run: terraform init

      - name: Terraform Plan
        working-directory: terraform/pve
        id: plan
        run: terraform plan -no-color -out=tfplan
        continue-on-error: true

      - name: Publish Plan to PR
        if: always() && github.event_name == 'pull_request'
        uses: hashicorp/setup-terraform@v3
        with:
          cli_config_credentials_token: ${{ env.TF_API_TOKEN }}

      - name: Add Plan Comment to PR
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const plan = fs.readFileSync('terraform/pve/tfplan', 'utf8');

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '## Terraform Plan\n```\n' + plan.substring(0, 65000) + '\n```'
            });

  terraform-apply:
    name: Apply Changes
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: terraform-validate
    environment:
      name: production
      # Requires manual approval for applies to production
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Load secret from 1Password
        uses: 1password/load-secrets-action@v4
        with:
          export-env: true
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
          TF_API_TOKEN: op://d3HL/Terraform Proxmox GitOps.env/TF_API_TOKEN

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          cli_config_credentials_token: ${{ env.TF_API_TOKEN }}

      - name: Terraform Init
        working-directory: terraform/pve
        run: terraform init

      - name: Terraform Apply
        working-directory: terraform/pve
        run: terraform apply -auto-approve

  tflint:
    name: TFLint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup TFLint
        uses: terraform-linters/setup-tflint@v4

      - name: Init TFLint
        run: tflint --init

      - name: Run TFLint
        working-directory: terraform
        run: tflint --config=.tflint.hcl --recursive
