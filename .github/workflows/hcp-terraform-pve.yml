name: HCP Terraform PVE

on:
  pull_request:
    paths:
      - "terraform/pve/**"
      - ".github/workflows/hcp-terraform-pve.yml"
  push:
    branches:
      - main
    paths:
      - "terraform/pve/**"
      - ".github/workflows/hcp-terraform-pve.yml"
  workflow_dispatch:
    inputs:
      apply:
        description: "Apply the HCP Terraform run"
        type: boolean
        required: false
        default: false

env:
  TF_CLOUD_ORGANIZATION: d3-org
  TF_WORKSPACE: pve
  CONFIG_DIRECTORY: ./terraform/pve
  TF_API_TOKEN: ${{ secrets.TF_API_TOKEN }}

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: hcp-terraform-pve-${{ github.ref }}
  cancel-in-progress: false

jobs:
  hcp-terraform:
    name: Queue HCP Terraform Run
    if: github.repository == 'd3hl/d3-homelab'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate inputs
        shell: bash
        run: |
          set -euo pipefail
          test -n "${TF_CLOUD_ORGANIZATION}"
          test -n "${TF_WORKSPACE}"
          test -n "${TF_API_TOKEN}"
          test -d "${CONFIG_DIRECTORY}"

      - name: Upload configuration
        id: upload
        uses: hashicorp/tfc-workflows-github/actions/upload-configuration@v1.3.2
        with:
          organization: ${{ env.TF_CLOUD_ORGANIZATION }}
          workspace: ${{ env.TF_WORKSPACE }}
          directory: ${{ env.CONFIG_DIRECTORY }}
          token: ${{ env.TF_API_TOKEN }}
          speculative: ${{ github.event_name == 'pull_request' }}

      - name: Create run
        id: run
        uses: hashicorp/tfc-workflows-github/actions/create-run@v1.3.2
        with:
          organization: ${{ env.TF_CLOUD_ORGANIZATION }}
          workspace: ${{ env.TF_WORKSPACE }}
          configuration_version: ${{ steps.upload.outputs.configuration_version_id }}
          token: ${{ env.TF_API_TOKEN }}
          plan_only: ${{ github.event_name == 'pull_request' }}

      - name: Get plan output
        if: github.event_name == 'pull_request'
        id: plan-output
        uses: hashicorp/tfc-workflows-github/actions/plan-output@v1.3.2
        with:
          token: ${{ env.TF_API_TOKEN }}
          plan: ${{ fromJSON(steps.run.outputs.payload).data.relationships.plan.data.id }}

      - name: Comment PR with plan summary
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        env:
          PLAN_ADD: ${{ steps.plan-output.outputs.add }}
          PLAN_CHANGE: ${{ steps.plan-output.outputs.change }}
          PLAN_DESTROY: ${{ steps.plan-output.outputs.destroy }}
          RUN_LINK: ${{ steps.run.outputs.run_link }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const marker = '<!-- hcp-terraform-pve-plan -->';
            const body = `${marker}
            #### HCP Terraform PVE Plan

            \`\`\`
            Plan: ${process.env.PLAN_ADD} to add, ${process.env.PLAN_CHANGE} to change, ${process.env.PLAN_DESTROY} to destroy.
            \`\`\`

            [HCP Terraform Run](${process.env.RUN_LINK})`;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find(comment => comment.body.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

      - name: Apply run
        if: |
          github.event_name == 'push' ||
          (github.event_name == 'workflow_dispatch' && inputs.apply)
        uses: hashicorp/tfc-workflows-github/actions/apply-run@v1.3.2
        with:
          token: ${{ env.TF_API_TOKEN }}
          run: ${{ steps.run.outputs.run_id }}
          comment: "Apply from GitHub Actions ${{ github.sha }}"
